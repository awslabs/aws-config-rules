##################################################################################
# Conformance Pack: Amazon Sagemaker AI Security and Governance best practices
# Expected to be deployed in conjunction with AI/ML Security & Governance Supporting Infrastructure best practices conformance pack
#
# Description: This conformance pack is intended to provide a baseline of security configurations for any AI workload (inclusive of AI, ML, generative AI, agentic AI, and physical AI)
#
# Total Rules: 91
# - 4 Custom Guard DSL rules
# - 87 AWS Managed rules
#
# Coverage:
# - Sagemaker: 4 custom rules + 15 managed rules (endpoints, store, monitoring)
# - S3: 14 rules (training data, model storage)
# - ECS: 9 rules (containerized inference)
# - EFS: 4 rules (shared storage)
# - EKS: 3 rules (Kubernetes ML)
# - EMR: 2 rules (data preprocessing)
# - Glue: 4 rules (data processing, ML transforms)
# - Athena: 7 rules (data catalog, workgroups, query analysis)
# - DynamoDB: 9 rules (feature store)
# - RDS: 20 rules (feature store)
#
# Required Tags (hardcoded in Guard DSL rules):
# - Environment: Deployment environment (dev, staging, prod)
# - DataClassification: Data sensitivity (public, internal, confidential, restricted)
# - OwnerTeam: Team responsible for the resource
#
# Tag Format by Resource (Guard DSL limitation):
# - Array format [{{Key, Value}}]: Guardrail, Profile -> use "some Tags[*].Key == X"
# - Map format {{key: value}}: KB, Prompt, Browser -> use "Tags.Environment exists"
# - No tags: Runtime
#
# Note: To change required tags, update Guard DSL rules manually for each format.
#
# IMPORTANT: Rules with Configurable Parameters
# The following managed rules use conformance pack Parameters for their InputParameters.
# Modify the default values in the Parameters section to match your requirements.
#
# 1. sagemaker-notebook-instance-platform-version
#    - SupportedPlatformIdentifierVersions: "notebook-al2-v2"
#
# 2. ecs-no-environment-secrets
#    - EcsSecretKeys: "AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,ECS_ENGINE_AUTH_DATA"
#
# 3. eks-cluster-supported-version
#    - OldestEksVersionSupported: "1.27"
#
# 4. glue-spark-job-supported-version
#    - MinimumSupportedGlueVersion: "3.0"
#
# Note: These parameters enforce specific security postures. Modify values only if
# your organization's security requirements differ from these defaults.
##################################################################################

Parameters:
  SupportedPlatformIdentifierVersions:
    Type: String
    Default: "notebook-al2-v2"
  EcsSecretKeys:
    Type: String
    Default: "AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,ECS_ENGINE_AUTH_DATA"
  OldestEksVersionSupported:
    Type: String
    Default: "1.27"
  MinimumSupportedGlueVersion:
    Type: String
    Default: "3.0"

Resources:
  # ============================================
  # SAGEMAKER CUSTOM RULES - ENDPOINT CONFIG (2)
  # ============================================
  
  EndpointDataCapture:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-sagemaker-endpoint-data-capture
      Description: Ensures model inference inputs/outputs are captured for AI/ML audit, bias detection, and compliance
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.DataCaptureConfig exists
              configuration.DataCaptureConfig.EnableCapture == true
            
              <<
                Violation: Data capture must be configured
                Fix: Configure DataCaptureConfig
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::SageMaker::EndpointConfig"]
  
  EndpointNetworkIsolation:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-sagemaker-endpoint-network-isolation
      Description: Prevents model containers from making outbound calls to protect training data and model IP
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { configuration.EnableNetworkIsolation == true 
              <<
                Violation: Network isolation must be enabled
                Fix: Enable NetworkIsolation
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::SageMaker::EndpointConfig"]
  
  # ============================================
  # SAGEMAKER CUSTOM RULES - FEATURE STORE (1)
  # ============================================
  
  FeatureGroupOnlineStore:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-sagemaker-featuregroup-online-store
      Description: Ensures SageMaker Feature Groups have online store for real-time AI/ML feature serving
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { configuration.OnlineStoreConfig exists 
              <<
                Violation: Online store must be configured
                Fix: Configure OnlineStoreConfig
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::SageMaker::FeatureGroup"]
  
  # ============================================
  # SAGEMAKER CUSTOM RULES - MONITORING (1)
  # ============================================
  
  MonitoringStatusActive:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-sagemaker-monitoring-active
      Description: Ensures SageMaker model monitoring is active for drift detection and AI/ML observability
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { configuration.MonitoringScheduleStatus in ["Scheduled", "Running"] 
              <<
                Violation: Monitoring must be Scheduled or Running
                Fix: Check resource state and resolve issues
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::SageMaker::MonitoringSchedule"]

  
