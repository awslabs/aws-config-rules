  # ============================================
  # OPENSEARCH SERVERLESS - CUSTOM RULES (4)
  # ============================================
  
  OpenSearchServerlessVectorSearchType:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-oss-vectorsearch-type
      Description: Ensures OpenSearch Serverless collections use VECTORSEARCH type for RAG and embedding workloads
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.Type == "VECTORSEARCH"
              <<
                Violation: Collection must be VECTORSEARCH type for AI/ML workloads
                Fix: Use VECTORSEARCH collection type
              >>
            }
          EnableDebugLogDelivery: true
      Scope:
        ComplianceResourceTypes: ["AWS::OpenSearchServerless::Collection"]
  
  OpenSearchServerlessCustomerKMS:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: opensearch-serverless-customer-kms
      Description: Ensures OpenSearch Serverless collections are encrypted with customer-managed KMS keys
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.EncryptionPolicy exists
              configuration.EncryptionPolicy.KmsKeyArn exists
              configuration.EncryptionPolicy.KmsKeyArn != ""
              <<
                Violation: Collection must use customer-managed KMS key
                Fix: Configure encryption policy with customer KMS key
              >>
            }
          EnableDebugLogDelivery: true
      Scope:
        ComplianceResourceTypes: ["AWS::OpenSearchServerless::Collection"]
  
  OpenSearchServerlessStandbyReplicas:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: opensearch-serverless-standby-replicas
      Description: Ensures OpenSearch Serverless collections have standby replicas for high availability
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.StandbyReplicas == "ENABLED"
              <<
                Violation: Collection must have standby replicas enabled for HA
                Fix: Enable standby replicas
              >>
            }
          EnableDebugLogDelivery: true
      Scope:
        ComplianceResourceTypes: ["AWS::OpenSearchServerless::Collection"]
  
  OpenSearchSecurityConfigSessionTimeout:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: opensearch-securityconfig-session-timeout
      Description: Limits OpenSearch Serverless SAML session duration to 60 minutes to reduce session hijack risk
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.SamlOptions.SessionTimeout <= 60
              <<
                Violation: Session timeout must be 60 minutes or less
                Fix: Set SessionTimeout to 60 or lower
              >>
            }
          EnableDebugLogDelivery: true
      Scope:
        ComplianceResourceTypes: ["AWS::OpenSearchServerless::SecurityConfig"]

