      Source: {Owner: AWS, SourceIdentifier: ELBV2_LISTENER_ENCRYPTION_IN_TRANSIT}

  ELBv2TargetGroupHealthCheckComplianceRule:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: elbv2-targetgroup-healthcheck-compliance
      Description: Ensures target groups have health checks enabled and use encrypted protocols (HTTPS or TLS)
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check {
              configuration.HealthCheckEnabled == true
              configuration.HealthCheckProtocol exists
              configuration.HealthCheckProtocol in ["HTTPS", "TLS"]
              <<
                Violation: Target group must have health checks enabled with HTTPS or TLS protocol
                Fix: Enable health checks and set HealthCheckProtocol to HTTPS or TLS
              >>
            }
          EnableDebugLogDelivery: true
      Scope:
        ComplianceResourceTypes: ["AWS::ElasticLoadBalancingV2::TargetGroup"]

