##################################################################################
# Conformance Pack: Self-Hosted AI/ML Security & Governance best practices
# Expected to be deployed in conjunction with AI/ML Security & Governance Supporting Infrastructure best practices conformance pack
#
# Description: This conformance pack is intended to provide a baseline of security configurations for any AI workload (inclusive of AI, ML, generative AI, agentic AI, and physical AI)
#
# Total Rules: 130
# - 9 Custom Guard DSL rules
# - 121 AWS Managed rules
#
# Coverage:
# - Comprehend, Kendra, HealthLake, Fraud Detector: 4 custom + 4 managed 
# - OpenSearch: 4 custom rules (vector search for RAG) + 10 managed 
# - EC2: 40 rules (GPU instances, ASG, launch templates, monitoring)
# - ALB/NLB: 15 managed + 1 custom (inference endpoints, TLS, logging, health checks)
# - API Gateway: 10 rules (serverless APIs, WAF, auth)
# - ECR: 5 rules (container images, scanning)
# - Secrets Manager: 5 rules (credentials, rotation)
# - S3: 14 rules (training data, model storage)
# - ECS: 9 rules (containerized inference)
# - EFS: 4 rules (shared storage)
# - EKS: 3 rules (Kubernetes ML)
# - EMR: 2 rules (data preprocessing)
#
# Required Tags (hardcoded in Guard DSL rules):
# - Environment: Deployment environment (dev, staging, prod)
# - DataClassification: Data sensitivity (public, internal, confidential, restricted)
# - OwnerTeam: Team responsible for the resource
#
# Tag Format by Resource (Guard DSL limitation):
# - Array format [{{Key, Value}}]: Guardrail, Profile -> use "some Tags[*].Key == X"
# - Map format {{key: value}}: KB, Prompt, Browser -> use "Tags.Environment exists"
# - No tags: Runtime
#
# Note: To change required tags, update Guard DSL rules manually for each format.
#
# IMPORTANT: Rules with Configurable Parameters
# The following managed rules use conformance pack Parameters for their InputParameters.
# Modify the default values in the Parameters section to match your requirements.
#
# 1. alb-desync-mode-check
#    - AlbDesyncMode: "defensive"
#
# 2. desired-instance-type
#    - AllowedInstanceTypes: "p3,p4,p5,g4dn,g5,g6,trn1,inf1,inf2"
#
# 3. approved-amis-by-tag
#    - ApprovedAmisByTagKeyAndValue: "Environment:production,Environment:staging,Environment:development"
#
# 4. desired-instance-tenancy
#    - AllowedInstanceTenancy: "default,dedicated"
#
# 5. api-gw-endpoint-type-check
#    - ApiGwEndpointConfigurationTypes: "PRIVATE,REGIONAL"
#
# 6. secretsmanager-rotation-enabled-check
#    - SecretsManagerMaxRotationFrequency: "2160" (90 days in hours)
#
# 7. eks-cluster-supported-version
#    - OldestEksVersionSupported: "1.28"
#
# 8. ecs-no-environment-secrets
#    - EcsSecretKeys: "password,secret,token,key,api"
#
# Note: These parameters enforce specific security postures. Modify values only if
# your organization's security requirements differ from these defaults.
##################################################################################

Parameters:
  AlbDesyncMode:
    Type: String
    Default: "defensive"
  AllowedInstanceTypes:
    Type: String
    Default: "p3,p4,p5,g4dn,g5,g6,trn1,inf1,inf2"
  ApprovedAmisByTagKeyAndValue:
    Type: String
    Default: "Environment:production,Environment:staging,Environment:development"
  AllowedInstanceTenancy:
    Type: String
    Default: "default,dedicated"
  ApiGwEndpointConfigurationTypes:
    Type: String
    Default: "PRIVATE,REGIONAL"
  SecretsManagerMaxRotationFrequency:
    Type: String
    Default: "2160"
  OldestEksVersionSupported:
    Type: String
    Default: "1.28"
  EcsSecretKeys:
    Type: String
    Default: "password,secret,token,key,api"

Resources:
  # ============================================
  # Comprehend, Kendra, HealthLake, Fraud Detector - CUSTOM RULES (4)
  # ============================================
  
  ComprehendFlywheelRequiredTags:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-comprehend-flywheel-tags
      Description: Ensures Comprehend Flywheels have governance tags for AI/ML model lifecycle tracking
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.Tags exists
              some configuration.Tags[*].Key == "Environment"
              some configuration.Tags[*].Key == "OwnerTeam"
              some configuration.Tags[*].Key == "DataClassification"
              <<
                Violation: Missing required governance tags
                Fix: Add Environment, DataClassification, OwnerTeam tags
              >>
            }
          EnableDebugLogDelivery: true
      Scope:
        ComplianceResourceTypes: ["AWS::Comprehend::Flywheel"]
  
  KendraIndexRequiredTags:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-kendra-index-tags
      Description: Ensures Kendra Indexes have governance tags for AI/ML search and retrieval tracking
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.Tags exists
              some configuration.Tags[*].Key == "Environment"
              some configuration.Tags[*].Key == "OwnerTeam"
              some configuration.Tags[*].Key == "DataClassification"
              <<
                Violation: Missing required governance tags
                Fix: Add Environment, DataClassification, OwnerTeam tags
              >>
            }
          EnableDebugLogDelivery: true
      Scope:
        ComplianceResourceTypes: ["AWS::Kendra::Index"]
  
  HealthLakeFHIRDatastoreStatusCheck:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-healthlake-fhir-status
      Description: Ensures HealthLake FHIRDatastores are ACTIVE before AI/ML health data processing
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.DatastoreStatus == "ACTIVE"
              <<
                Violation: FHIRDatastore is not ACTIVE
                Fix: Ensure datastore is in ACTIVE state before use
              >>
            }
          EnableDebugLogDelivery: true
      Scope:
        ComplianceResourceTypes: ["AWS::HealthLake::FHIRDatastore"]
  
  HealthLakeFHIRDatastoreRequiredTags:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-healthlake-fhir-tags
