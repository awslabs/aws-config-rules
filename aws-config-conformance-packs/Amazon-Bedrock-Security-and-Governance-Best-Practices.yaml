##################################################################################
# Conformance Pack: Amazon Bedrock Security and Governance best practices
# Expected to be deployed in conjunction with AI/ML Security & Governance Supporting Infrastructure best practices conformance pack
# 
# Description: This conformance pack is intended to provide a baseline of security configurations for any AI workload (inclusive of AI, ML, generative AI, agentic AI, and physical AI)
#
# Total Rules: 97
# - 25 Custom Guard DSL rules
# - 72 AWS Managed rules
#
# Coverage:
# - Bedrock: 21 custom rules (guardrails, KB, prompt, inference, runtime, datasource, gateway, memory)
# - OpenSearch: 10 managed + 4 custom (domain, serverless)
# - S3: 14 rules (training data, model storage)
# - Secrets Manager: 5 rules (credentials, rotation)
# - API Gateway: 10 rules (serverless APIs, WAF, auth)
# - Step Functions: 1 rule (agent workflows)
# - SNS: 2 rules (notifications)
# - SQS: 1 rule (async invocations)
# - Neptune: 9 rules (Vector Database for Knowledge Bases)
# - RDS: 20 rules (Vector storage)
#
#
# Required Tags (hardcoded in Guard DSL rules):
# - Environment: Deployment environment (dev, staging, prod)
# - DataClassification: Data sensitivity (public, internal, confidential, restricted)
# - OwnerTeam: Team responsible for the resource
#
# Tag Format by Resource (Guard DSL limitation):
# - Array format [{{Key, Value}}]: Guardrail, Profile -> use "some Tags[*].Key == X"
# - Map format {{key: value}}: KB, Prompt, Browser -> use "Tags.Environment exists"
# - No tags: Runtime
#
# Note: To change required tags, update Guard DSL rules manually for each format.
#
# IMPORTANT: Rules with Configurable Parameters
# The following managed rules use conformance pack Parameters for their InputParameters.
# Modify the default values in the Parameters section to match your requirements.
#
# 1. api-gw-endpoint-type-check
#    - ApiGwEndpointConfigurationTypes: "PRIVATE"
#
# Note: These parameters enforce specific security postures. Modify values only if
# your organization's security requirements differ from these defaults.
##################################################################################

Parameters:
  ApiGwEndpointConfigurationTypes:
    Type: String
    Default: "PRIVATE"

Resources:
  # ============================================
  # BEDROCK CUSTOM RULES - GUARDRAIL (4)
  # ============================================
  
  GuardrailStatusCheck:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-bedrock-guardrail-status
      Description: Ensures Bedrock Guardrails are operational to enforce content filtering and responsible AI policies
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { configuration.Status in ["READY", "VERSIONED"] 
              <<
                Violation: Guardrail must be READY or VERSIONED
                Fix: Check resource state and resolve issues
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::Bedrock::Guardrail"]
  
  GuardrailRequiredTags:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-bedrock-guardrail-tags
      Description: Ensures Bedrock Guardrails have governance tags for responsible AI tracking and ownership
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.Tags exists
              some configuration.Tags[*].Key == "Environment"
              some configuration.Tags[*].Key == "DataClassification"
              some configuration.Tags[*].Key == "OwnerTeam"
            
              <<
                Violation: Missing required governance tags
                Fix: Add Environment, DataClassification, OwnerTeam tags
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::Bedrock::Guardrail"]
  
  KBStatusCheck:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-bedrock-kb-status
      Description: Ensures Bedrock Knowledge Bases are ACTIVE for RAG-based AI/ML workloads
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { configuration.Status == "ACTIVE" 
              <<
                Violation: Knowledge Base must be ACTIVE
                Fix: Check resource state and resolve issues
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::Bedrock::KnowledgeBase"]
  
  KBRequiredTags:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-bedrock-kb-tags
      Description: Ensures Bedrock Knowledge Bases have governance tags for AI/ML data lineage and ownership
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.Tags exists
              configuration.Tags.Environment exists
              configuration.Tags.DataClassification exists
              configuration.Tags.OwnerTeam exists
            
              <<
                Violation: Missing required governance tags
                Fix: Add Environment, DataClassification, OwnerTeam tags
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::Bedrock::KnowledgeBase"]
  
  PromptRequiredTags:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-bedrock-prompt-tags
      Description: Ensures Bedrock Prompts have governance tags for prompt versioning and AI/ML audit trails
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.Tags exists
              configuration.Tags.Environment exists
              configuration.Tags.DataClassification exists
              configuration.Tags.OwnerTeam exists
            
              <<
                Violation: Missing required governance tags
                Fix: Add Environment, DataClassification, OwnerTeam tags
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::Bedrock::Prompt"]
  
  # ============================================
  # BEDROCK CUSTOM RULES - INFERENCE PROFILE (3)
