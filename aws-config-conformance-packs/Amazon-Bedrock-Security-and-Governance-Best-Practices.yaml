  # ============================================
  # BEDROCK CUSTOM RULES - DataSource (3)
  # ============================================
  
  DataSourceStatusCheck:
      Type: AWS::Config::ConfigRule
      Properties:
        ConfigRuleName: aiml-bedrock-datasource-status
        Description: Ensures Bedrock Data Sources are AVAILABLE for RAG knowledge ingestion
        Source:
          Owner: CUSTOM_POLICY
          SourceDetails:
            - EventSource: aws.config
              MessageType: ConfigurationItemChangeNotification
          CustomPolicyDetails:
            PolicyRuntime: guard-2.x.x
            EnableDebugLogDelivery: true
            PolicyText: |
              rule check { 
                configuration.DataSourceStatus == "AVAILABLE"
                <<
                  Violation: Data Source must be AVAILABLE
                  Fix: Investigate and resolve data source issues
                >>
              }
        Scope:
          ComplianceResourceTypes: ["AWS::Bedrock::DataSource"]

  DataSourceDeletionPolicyCheck:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-bedrock-datasource-retain-policy
      Description: Prevents accidental deletion of RAG knowledge data by enforcing RETAIN policy on Bedrock data sources
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          EnableDebugLogDelivery: true
          PolicyText: |
            rule check { 
              configuration.DataDeletionPolicy == "RETAIN"
              <<
                Violation: Data Source deletion policy must be RETAIN
                Fix: Set DataDeletionPolicy to RETAIN to prevent data loss
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::Bedrock::DataSource"]

  DataSourceNoFailures:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-bedrock-datasource-no-failures
      Description: Ensures Bedrock Data Sources have no ingestion failures affecting RAG quality
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          EnableDebugLogDelivery: true
          PolicyText: |
            rule check { 
              configuration.FailureReasons empty
              <<
                Violation: Data Source has failure reasons
                Fix: Investigate and resolve data source failures
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::Bedrock::DataSource"]

