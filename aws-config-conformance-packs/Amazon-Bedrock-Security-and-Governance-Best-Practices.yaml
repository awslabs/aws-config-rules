  # ============================================
  # BEDROCK CUSTOM RULES - RUNTIME & BROWSER (5)
  # ============================================
  
  RuntimeVPC:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-bedrock-runtime-vpc
      Description: Ensures Bedrock Runtime is deployed in a VPC for AI/ML network isolation
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.NetworkConfiguration.NetworkModeConfig exists
              configuration.NetworkConfiguration.NetworkModeConfig.VpcId exists
            
              <<
                Violation: Runtime must be in VPC
                Fix: Configure VPC settings
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::BedrockAgentCore::Runtime"]
  
  RuntimeSG:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-bedrock-runtime-security-groups
      Description: Ensures Bedrock Runtime has security groups to control AI/ML agent network access
      Source:
        Owner: CUSTOM_POLICY
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.NetworkConfiguration.NetworkModeConfig.SecurityGroups exists
              configuration.NetworkConfiguration.NetworkModeConfig.SecurityGroups not empty
            
              <<
                Violation: Runtime must have security groups
                Fix: Attach security groups
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::BedrockAgentCore::Runtime"]
  
  BrowserVPC:
