          PolicyText: |
            rule check { 
              configuration.AuthorizerType != "NONE"
              <<
                Violation: No authorizer configured
                Fix: Set AuthorizerType to CUSTOM
              >>
            }
      Scope:
        ComplianceResourceTypes: ["AWS::BedrockAgentCore::Gateway"]

  GatewayRequiredTags:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: aiml-bedrock-gateway-tags
