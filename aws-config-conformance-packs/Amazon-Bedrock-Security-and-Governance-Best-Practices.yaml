        CustomPolicyDetails:
          PolicyRuntime: guard-2.x.x
          PolicyText: |
            rule check { 
              configuration.NetworkConfiguration.VpcConfig.SecurityGroups exists
              configuration.NetworkConfiguration.VpcConfig.SecurityGroups not empty
            
              <<
                Violation: Browser must have security groups
                Fix: Attach security groups
              >>
